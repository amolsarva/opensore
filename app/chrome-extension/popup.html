<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OpenSore</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <span class="logo">🕵️</span>
    <div class="header-text">
      <div class="title">OpenSore</div>
      <div class="subtitle" id="server-status">Checking…</div>
    </div>
  </header>

  <div id="app">
    <div class="loading">Loading…</div>
  </div>

  <footer>
    <button id="port-toggle" class="port-toggle">⚙ Port <span id="port-display">8000</span></button>
    <div id="port-edit" class="port-edit" hidden>
      <input type="number" id="port-input" value="8000" min="1" max="65535">
      <button id="save-port">Save</button>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
