mapper_contracts:
  - prompt: check the health of my opensore and then show me all connected services
    has_unhandled: false
    actions:
      - kind: slash
        content: /health
        source: deterministic
        target_surface: slash
      - kind: slash
        content: /list integrations
        source: deterministic
        target_surface: slash
    trace:
      - clause_text: check the health of my opensore
        clause_position: 0
        rules:
          - slash_registry:/health
        matched_action_kinds:
          - slash
      - clause_text: show me all connected services
        clause_position: 41
        rules:
          - slash_registry:/list integrations
        matched_action_kinds:
          - slash

  - prompt: run synthetic test 005 now
    has_unhandled: false
    actions:
      - kind: synthetic_test
        content: rds_postgres:005-failover
        source: deterministic
        target_surface: investigation
    trace:
      - clause_text: run synthetic test 005 now
        clause_position: 0
        rules:
          - synthetic_suite
        matched_action_kinds:
          - synthetic_test

  - prompt: run synthetic test 999
    has_unhandled: false
    actions:
      - kind: synthetic_test
        content: rds_postgres:unknown:999
        source: deterministic
        target_surface: investigation
    trace:
      - clause_text: run synthetic test 999
        clause_position: 0
        rules:
          - synthetic_suite
        matched_action_kinds:
          - synthetic_test

  - prompt: run /remote and then investigate "hello world"
    has_unhandled: false
    actions:
      - kind: slash
        content: /remote
        source: deterministic
        target_surface: slash
      - kind: investigation
        content: hello world
        source: deterministic
        target_surface: investigation
    trace:
      - clause_text: run /remote
        clause_position: 0
        rules:
          - slash_registry:/remote
        matched_action_kinds:
          - slash
      - clause_text: investigate "hello world"
        clause_position: 21
        rules:
          - fallback_investigation
        matched_action_kinds:
          - investigation

  - prompt: show me datadog integration details
    has_unhandled: false
    actions:
      - kind: slash
        content: /integrations show datadog
        source: deterministic
        target_surface: slash
    trace:
      - clause_text: show me datadog integration details
        clause_position: 0
        rules:
          - integration_detail:datadog
        matched_action_kinds:
          - slash

  - prompt: please implement process auto-discovery
    has_unhandled: false
    actions:
      - kind: implementation
        content: process auto-discovery
        source: deterministic
        target_surface: implementation
    trace:
      - clause_text: please implement process auto-discovery
        clause_position: 0
        rules:
          - fallback_implementation
        matched_action_kinds:
          - implementation

  - prompt: kill the syntehtic_test because it is running way too long
    has_unhandled: false
    actions:
      - kind: task_cancel
        content: synthetic_test
        source: deterministic
        target_surface: slash
    trace:
      - clause_text: kill the syntehtic_test because it is running way too long
        clause_position: 0
        rules:
          - fallback_task_cancel
        matched_action_kinds:
          - task_cancel

