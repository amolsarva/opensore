services:
  opensore-db:
    image: postgres:16-alpine
    container_name: opensore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: opensore
      POSTGRES_USER: opensore
      POSTGRES_PASSWORD: opensore
    ports:
      - "5432:5432"
    volumes:
      - opensore-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensore -d opensore"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: opensore-db-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      opensore-db:
        condition: service_healthy

volumes:
  opensore-postgres-data:
